[package]
name = "rusquitto"
version = "0.4.0"
edition = "2024"
default-run = "rusquitto"

[dependencies]
socket2 = { version = "0.6.2", features = ["all"] }
glommio = "0.9.0"
bytes = "1.11"
mqttbytes = "0.6"
futures-lite = "2.6"

# Logging / observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt"] }
tracing-appender = "0.2"

# CLI & configuration
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "1.1"

# Process signals (graceful shutdown on SIGTERM / SIGINT)
signal-hook = "0.4"

[[bin]]
name = "mosquitto"
path = "src/bin/mosquitto.rs"

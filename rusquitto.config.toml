# rusquitto configuration. Every value below is the built-in default, so this
# file behaves exactly like running with no config. Unknown keys are rejected.
# The path is positional:  rusquitto rusquitto.config.toml

[server]
bind = "127.0.0.1"        # IP to bind; all shards share it via SO_REUSEPORT
port = 1883               # native MQTT TCP port
websocket = true          # also accept MQTT-over-WebSocket (browser clients)
websocket_port = 1884     # WebSocket listener port (must differ from `port`)
listen_backlog = 1024     # per-shard listen(2) backlog (> 0)
socket_recv_buffer = 0    # SO_RCVBUF cap per client socket, bytes (0 = kernel default); bounds kernel-side memory
socket_send_buffer = 0    # SO_SNDBUF cap per client socket, bytes (0 = kernel default)

[tls]
# TLS termination (rustls). Disabled by default. Only TLS 1.3 and 1.2 are offered,
# with strong AEAD + ECDHE cipher suites; older protocols/ciphers are impossible.
enabled = false           # master switch for the mqtts / wss listeners
port = 8883               # native MQTT-over-TLS (mqtts) port; must differ from other listeners
websocket = true          # also serve MQTT-over-WebSocket-over-TLS (wss) for browsers
websocket_port = 8884     # wss listener port (used only when enabled and websocket)
# cert_file = "certs/server.pem"  # PEM certificate chain, leaf first (required when enabled)
# key_file  = "certs/server.key"  # PEM private key: PKCS#8, PKCS#1, or SEC1 (required when enabled)
# --- mutual TLS (client-certificate authentication) ---
# client_ca_file = "certs/ca.pem"  # PEM bundle of trusted client CAs; set to enable mTLS
# require_client_cert = false       # true => a client with no cert trusted by the CA fails the
#                                   #   handshake. A cert-verified client that sends no MQTT
#                                   #   username is authenticated by the certificate alone.
# reload_interval = 0               # seconds between checking the cert/key/CA files and hot-reloading
#                                   #   a rotated cert into new handshakes (0 = off; existing
#                                   #   connections keep the cert they handshook with)
# cert_cn_as_username = false       # use a verified client cert's subject CN as the MQTT username,
#                                   #   so [[auth.users]] ACLs apply per device (a client that also
#                                   #   sends a username is checked the usual way). Default false =>
#                                   #   a cert-verified client with no username is anonymous for ACLs.
# For mqtts:// / wss:// in production, front rusquitto with a trusted certificate
# (e.g. from your CA or Let's Encrypt), or use mutual TLS above so only clients
# holding a CA-signed certificate can connect.

[runtime]
# cores = 8               # CPU cores to run on (one shard/executor per core). Default: all online; over-count is clamped.
placement = "max-spread"  # max-spread (latency) | max-pack (locality) | unbound (no pinning)
mesh_capacity = 1024      # per-link inter-shard mesh buffer (> 0)

[logging]
level = "info,rusquitto=debug"      # EnvFilter syntax; RUST_LOG overrides at startup
dir = "logs"                        # log directory (created if missing)
file = "rusquitto.log"              # main daily-rotating log
error_file = "rusquitto.error.log"  # ERROR-only daily-rotating log
enable_terminal = false             # also log to stdout (off = silent terminal; files always active)
format = "pretty"                   # stdout format when enabled: pretty | json

[limits]
max_connections_per_shard = 16384   # further connections on a shard are refused
max_connections_per_ip = 0          # max concurrent connections per client IP per shard (0 = unlimited; see note)
max_payload_size = 65536            # largest accepted packet, bytes (> 0); also caps WebSocket frames
initial_read_buffer = 0             # per-connection read buffer, bytes (0 = grow on demand, trimmed when idle)
max_inflight = 128                  # outbound QoS 1/2 window; also the advertised inbound Receive Maximum
max_qos = 2                         # max QoS granted to subscribers (0 | 1 | 2)
keep_alive = 60                     # server keep-alive advertised in CONNACK; 0 disables the override
retain_available = true             # accept and serve retained messages
connect_timeout = 10                # seconds a new socket has to send CONNECT before it is dropped
max_session_expiry = 86400          # cap on Session Expiry Interval, seconds (0 = uncapped)
max_subscriptions_per_client = 1024 # cap on active subscriptions per client (0 = unlimited)
max_retained_messages = 100000      # cap on distinct retained topics per shard (0 = unlimited)
max_message_rate = 0                # max inbound PUBLISH/sec per connection (0 = unlimited); over-rate clients are throttled, not dropped

[overload]
# Per-shard overload handling. A probe tracks each shard's scheduling delay
# (reactor saturation); the thresholds below act on it. Detection is always on;
# the mitigations are opt-in. Exposed as $SYS/broker/load/max-scheduling-delay-ms.
stall_warn_ms = 100        # log a WARN while a shard's scheduling delay exceeds this (0 = never)
admission_delay_ms = 0     # reject NEW connections above this delay (0 = off); client retry may hash to a cooler core
shed_delay_ms = 0          # shed EXISTING connections above this sustained delay (0 = off); they reconnect and SO_REUSEPORT rehashes them
shed_batch = 8             # max connections shed per second per shard while shedding

[parking]
# Parked-connection idle path. A fully idle plain-TCP connection (no buffered
# bytes, no partial frame, no in-flight QoS state, no queued deliveries) has its
# per-connection task torn down after idle_grace_secs; only its fd — armed on a
# small per-shard io_uring readiness ring — and a minimal resume record remain
# (~0.1-0.5 KiB instead of several KiB). Any inbound byte or a delivery routed to
# the parked client resurrects it transparently. Plain TCP only (TLS/WebSocket
# streams carry mid-stream codec state and never park). Gauge:
# $SYS/broker/parked-connections.
enabled = true             # master switch
idle_grace_secs = 30       # seconds fully idle before parking; a client pinging every K secs
                           #   is parked ~(K - grace)/K of the time, so keep this well below
                           #   the fleet's typical keep-alive interval

[persistence]
# Disk-backed durability. Disabled by default (broker is otherwise in-memory).
# When enabled, both the retained-message set and suspended sessions (their
# subscriptions, in-flight QoS 1/2 state, and offline queue) are snapshotted and
# restored across restarts. Retained is one shared file; sessions are one file per
# shard (sessions-<n>.mqtt), since sessions are shard-local.
enabled = false            # master switch
dir = "data"               # directory for snapshot files (created if missing)
retained_file = "retained.mqtt"  # retained-message snapshot filename
snapshot_interval = 300    # seconds between snapshots (0 = only on graceful shutdown); a crash loses retained updates since the last snapshot
wal_flush_ms = 200         # session write-ahead log flush interval, ms (0 = disabled, snapshot-only).
                           #   When set, session suspensions and offline-queue growth are logged (fdatasync'd)
                           #   at this cadence and replayed over the snapshot on startup, so a crash loses at
                           #   most this window of durable *session* state instead of a whole snapshot_interval.
                           #   Retained messages are snapshot-only (not WAL'd).

[auth]
# Default (anonymous allowed, no users) makes auth a no-op.
allow_anonymous = true              # allow clients that send no username

# Topic-filter allow-lists for ANONYMOUS clients (+/# wildcards). Omit for
# unrestricted (the default); an empty list denies everything.
# anonymous_publish = ["public/#"]
# anonymous_subscribe = ["public/#", "status"]

# One table per user. Set exactly one of `password` / `password_hash`.
# `password_hash` is either an Argon2 PHC string (RECOMMENDED — salted,
# memory-hard:  echo -n 'pw' | argon2 "$(openssl rand -base64 16)" -id -e)
# or a legacy hex SHA-256 (printf %s 'pw' | sha256sum). Note an Argon2 verify
# deliberately costs ~10-50 ms of CPU on the accepting core per CONNECT.
# Optional `publish` / `subscribe` topic-filter allow-lists (+/# wildcards);
# omit a list = unrestricted.
# [[auth.users]]
# username = "alice"
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."
# publish = ["sensors/#"]
# subscribe = ["sensors/#", "cmd/alice"]

[sys]
enabled = true            # publish retained $SYS/broker/... metrics
interval = 10             # seconds between $SYS updates (> 0)

# =============================================================================
# rusquitto — example configuration
#
# Run with:  rusquitto --config rusquitto.toml
#
# Every key is OPTIONAL and falls back to the documented default, so a minimal
# file (or even an empty one) is valid. Unknown keys are rejected to catch typos.
# =============================================================================

# -----------------------------------------------------------------------------
# [server] — network ingress
# All shards bind this same address/port using SO_REUSEPORT; the kernel load-
# balances incoming connections across them.
# -----------------------------------------------------------------------------
[server]
bind = "0.0.0.0"        # IP to bind (IPv4 or IPv6). Default: "127.0.0.1"
port = 1883             # TCP port. Default: 1883
listen_backlog = 1024   # listen(2) backlog per shard. Default: 1024

# -----------------------------------------------------------------------------
# [runtime] — thread-per-core / glommio settings
# -----------------------------------------------------------------------------
[runtime]
# Number of shards (pinned executors). Omit to derive it from the online core
# count times `cpu_fraction`. Uncomment to pin an exact count:
# shards = 4
cpu_fraction = 0.75     # Fraction of cores to use when `shards` is unset. Default: 0.75
placement = "max-spread"  # "max-spread" | "max-pack" | "unbound". Default: "max-spread"
mesh_capacity = 1024    # Per-link buffer of the inter-shard channel mesh. Default: 1024

# -----------------------------------------------------------------------------
# [logging] — wires into the non-blocking tracing pipeline (logger.rs)
# -----------------------------------------------------------------------------
[logging]
level = "info,rusquitto=debug"     # EnvFilter directive. RUST_LOG overrides this.
dir = "logs"                       # Directory for rotating log files (auto-created).
file = "rusquitto.log"             # Main daily-rotating JSON log.
error_file = "rusquitto.error.log" # Dedicated daily-rotating ERROR log.
enable_terminal = false            # Terminal output OFF by default (silent, fastest). true = live monitoring.
format = "pretty"                  # stdout format when enabled: "pretty" (dev) | "json" (prod).

# -----------------------------------------------------------------------------
# [limits] — broker / MQTT resource limits
# -----------------------------------------------------------------------------
[limits]
max_connections_per_shard = 16384  # Concurrent connections accepted per shard.
max_payload_size = 65536           # Largest accepted MQTT packet, in bytes (64 KiB).
initial_read_buffer = 4096         # Initial per-connection assembly buffer, in bytes.
max_inflight = 128                 # Outbound QoS 1/2 in-flight window per connection.
max_qos = 2                        # Max QoS granted to subscribers: 0, 1, or 2.
keep_alive = 60                    # Server keep-alive (seconds) advertised in CONNACK. 0 disables.
retain_available = true            # Whether retained messages are accepted/served.

# -----------------------------------------------------------------------------
# [auth] — connection authentication
# -----------------------------------------------------------------------------
# Defaults are open: anonymous allowed, no users -> any client may connect.
# Set allow_anonymous = false and/or add users to require credentials.
[auth]
allow_anonymous = true             # false = clients must present a valid username/password.

# One table per user. Passwords are plaintext, so keep this file secret.
# [[auth.users]]
# username = "alice"
# password = "s3cret"
